# Render Blueprint. Позволяет создать сервис в один клик через
# Render Dashboard -> New -> Blueprint, указав этот репозиторий
# (или сделать всё вручную в UI — см. backend/README.md).
services:
  - type: web
    name: vologda-ads-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: AUTO_CREATE_TABLES
        value: "false"
      - key: DATABASE_URL
        sync: false  # вставьте вручную connection string из Supabase (postgresql+asyncpg://...)
      - key: DATABASE_SSL
        value: "true"
      - key: DATABASE_DISABLE_STATEMENT_CACHE
        value: "true"
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ADMIN_SESSION_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false  # например https://your-username.github.io
      - key: UPLOAD_DIR
        value: uploads
